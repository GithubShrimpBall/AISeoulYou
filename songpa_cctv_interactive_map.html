  <style id="leaflet-bundled-css">/* required styles */

.leaflet-pane,
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-tile-container,
.leaflet-pane > svg,
.leaflet-pane > canvas,
.leaflet-zoom-box,
.leaflet-image-layer,
.leaflet-layer {
	position: absolute;
	left: 0;
	top: 0;
	}
.leaflet-container {
	overflow: hidden;
	}
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow {
	-webkit-user-select: none;
	   -moz-user-select: none;
	        user-select: none;
	  -webkit-user-drag: none;
	}
/* Prevents IE11 from highlighting tiles in blue */
.leaflet-tile::selection {
	background: transparent;
}
/* Safari renders non-retina tile on retina better with this, but Chrome is worse */
.leaflet-safari .leaflet-tile {
	image-rendering: -webkit-optimize-contrast;
	}
/* hack that prevents hw layers "stretching" when loading new tiles */
.leaflet-safari .leaflet-tile-container {
	width: 1600px;
	height: 1600px;
	-webkit-transform-origin: 0 0;
	}
.leaflet-marker-icon,
.leaflet-marker-shadow {
	display: block;
	}
/* .leaflet-container svg: reset svg max-width decleration shipped in Joomla! (joomla.org) 3.x */
/* .leaflet-container img: map is broken in FF if you have max-width: 100% on tiles */
.leaflet-container .leaflet-overlay-pane svg {
	max-width: none !important;
	max-height: none !important;
	}
.leaflet-container .leaflet-marker-pane img,
.leaflet-container .leaflet-shadow-pane img,
.leaflet-container .leaflet-tile-pane img,
.leaflet-container img.leaflet-image-layer,
.leaflet-container .leaflet-tile {
	max-width: none !important;
	max-height: none !important;
	width: auto;
	padding: 0;
	}

.leaflet-container img.leaflet-tile {
	/* See: https://bugs.chromium.org/p/chromium/issues/detail?id=600120 */
	mix-blend-mode: plus-lighter;
}

.leaflet-container.leaflet-touch-zoom {
	-ms-touch-action: pan-x pan-y;
	touch-action: pan-x pan-y;
	}
.leaflet-container.leaflet-touch-drag {
	-ms-touch-action: pinch-zoom;
	/* Fallback for FF which doesn't support pinch-zoom */
	touch-action: none;
	touch-action: pinch-zoom;
}
.leaflet-container.leaflet-touch-drag.leaflet-touch-zoom {
	-ms-touch-action: none;
	touch-action: none;
}
.leaflet-container {
	-webkit-tap-highlight-color: transparent;
}
.leaflet-container a {
	-webkit-tap-highlight-color: rgba(51, 181, 229, 0.4);
}
.leaflet-tile {
	filter: inherit;
	visibility: hidden;
	}
.leaflet-tile-loaded {
	visibility: inherit;
	}
.leaflet-zoom-box {
	width: 0;
	height: 0;
	-moz-box-sizing: border-box;
	     box-sizing: border-box;
	z-index: 800;
	}
/* workaround for https://bugzilla.mozilla.org/show_bug.cgi?id=888319 */
.leaflet-overlay-pane svg {
	-moz-user-select: none;
	}

.leaflet-pane         { z-index: 400; }

.leaflet-tile-pane    { z-index: 200; }
.leaflet-overlay-pane { z-index: 400; }
.leaflet-shadow-pane  { z-index: 500; }
.leaflet-marker-pane  { z-index: 600; }
.leaflet-tooltip-pane   { z-index: 650; }
.leaflet-popup-pane   { z-index: 700; }

.leaflet-map-pane canvas { z-index: 100; }
.leaflet-map-pane svg    { z-index: 200; }

.leaflet-vml-shape {
	width: 1px;
	height: 1px;
	}
.lvml {
	behavior: url(#default#VML);
	display: inline-block;
	position: absolute;
	}


/* control positioning */

.leaflet-control {
	position: relative;
	z-index: 800;
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}
.leaflet-top,
.leaflet-bottom {
	position: absolute;
	z-index: 1000;
	pointer-events: none;
	}
.leaflet-top {
	top: 0;
	}
.leaflet-right {
	right: 0;
	}
.leaflet-bottom {
	bottom: 0;
	}
.leaflet-left {
	left: 0;
	}
.leaflet-control {
	float: left;
	clear: both;
	}
.leaflet-right .leaflet-control {
	float: right;
	}
.leaflet-top .leaflet-control {
	margin-top: 10px;
	}
.leaflet-bottom .leaflet-control {
	margin-bottom: 10px;
	}
.leaflet-left .leaflet-control {
	margin-left: 10px;
	}
.leaflet-right .leaflet-control {
	margin-right: 10px;
	}


/* zoom and fade animations */

.leaflet-fade-anim .leaflet-popup {
	opacity: 0;
	-webkit-transition: opacity 0.2s linear;
	   -moz-transition: opacity 0.2s linear;
	        transition: opacity 0.2s linear;
	}
.leaflet-fade-anim .leaflet-map-pane .leaflet-popup {
	opacity: 1;
	}
.leaflet-zoom-animated {
	-webkit-transform-origin: 0 0;
	    -ms-transform-origin: 0 0;
	        transform-origin: 0 0;
	}
svg.leaflet-zoom-animated {
	will-change: transform;
}

.leaflet-zoom-anim .leaflet-zoom-animated {
	-webkit-transition: -webkit-transform 0.25s cubic-bezier(0,0,0.25,1);
	   -moz-transition:    -moz-transform 0.25s cubic-bezier(0,0,0.25,1);
	        transition:         transform 0.25s cubic-bezier(0,0,0.25,1);
	}
.leaflet-zoom-anim .leaflet-tile,
.leaflet-pan-anim .leaflet-tile {
	-webkit-transition: none;
	   -moz-transition: none;
	        transition: none;
	}

.leaflet-zoom-anim .leaflet-zoom-hide {
	visibility: hidden;
	}


/* cursors */

.leaflet-interactive {
	cursor: pointer;
	}
.leaflet-grab {
	cursor: -webkit-grab;
	cursor:    -moz-grab;
	cursor:         grab;
	}
.leaflet-crosshair,
.leaflet-crosshair .leaflet-interactive {
	cursor: crosshair;
	}
.leaflet-popup-pane,
.leaflet-control {
	cursor: auto;
	}
.leaflet-dragging .leaflet-grab,
.leaflet-dragging .leaflet-grab .leaflet-interactive,
.leaflet-dragging .leaflet-marker-draggable {
	cursor: move;
	cursor: -webkit-grabbing;
	cursor:    -moz-grabbing;
	cursor:         grabbing;
	}

/* marker & overlays interactivity */
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-image-layer,
.leaflet-pane > svg path,
.leaflet-tile-container {
	pointer-events: none;
	}

.leaflet-marker-icon.leaflet-interactive,
.leaflet-image-layer.leaflet-interactive,
.leaflet-pane > svg path.leaflet-interactive,
svg.leaflet-image-layer.leaflet-interactive path {
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}

/* visual tweaks */

.leaflet-container {
	background: #ddd;
	outline-offset: 1px;
	}
.leaflet-container a {
	color: #0078A8;
	}
.leaflet-zoom-box {
	border: 2px dotted #38f;
	background: rgba(255,255,255,0.5);
	}


/* general typography */
.leaflet-container {

	font-size: 0.75rem;
	line-height: 1.5;
	}


/* general toolbar styles */

.leaflet-bar {
	box-shadow: 0 1px 5px rgba(0,0,0,0.65);
	border-radius: 4px;
	}
.leaflet-bar a {
	background-color: #fff;
	border-bottom: 1px solid #ccc;
	width: 26px;
	height: 26px;
	line-height: 26px;
	display: block;
	text-align: center;
	text-decoration: none;
	color: black;
	}
.leaflet-bar a,
.leaflet-control-layers-toggle {
	background-position: 50% 50%;
	background-repeat: no-repeat;
	display: block;
	}
.leaflet-bar a:hover,
.leaflet-bar a:focus {
	background-color: #f4f4f4;
	}
.leaflet-bar a:first-child {
	border-top-left-radius: 4px;
	border-top-right-radius: 4px;
	}
.leaflet-bar a:last-child {
	border-bottom-left-radius: 4px;
	border-bottom-right-radius: 4px;
	border-bottom: none;
	}
.leaflet-bar a.leaflet-disabled {
	cursor: default;
	background-color: #f4f4f4;
	color: #bbb;
	}

.leaflet-touch .leaflet-bar a {
	width: 30px;
	height: 30px;
	line-height: 30px;
	}
.leaflet-touch .leaflet-bar a:first-child {
	border-top-left-radius: 2px;
	border-top-right-radius: 2px;
	}
.leaflet-touch .leaflet-bar a:last-child {
	border-bottom-left-radius: 2px;
	border-bottom-right-radius: 2px;
	}

/* attribution and scale controls */

.leaflet-container .leaflet-control-attribution {
	background: #fff;
	background: rgba(255, 255, 255, 0.8);
	margin: 0;
	}
.leaflet-control-attribution,
.leaflet-control-scale-line {
	padding: 0 5px;
	color: #333;
	line-height: 1.4;
	}
.leaflet-control-attribution a {
	text-decoration: none;
	}
.leaflet-control-attribution a:hover,
.leaflet-control-attribution a:focus {
	text-decoration: underline;
	}
.leaflet-attribution-flag {
	display: inline !important;
	vertical-align: baseline !important;
	width: 1em;
	height: 0.6669em;
	}
.leaflet-left .leaflet-control-scale {
	margin-left: 5px;
	}
.leaflet-bottom .leaflet-control-scale {
	margin-bottom: 5px;
	}
.leaflet-control-scale-line {
	border: 2px solid #777;
	border-top: none;
	line-height: 1.1;
	padding: 2px 5px 1px;
	white-space: nowrap;
	-moz-box-sizing: border-box;
	     box-sizing: border-box;
	background: rgba(255, 255, 255, 0.8);
	text-shadow: 1px 1px #fff;
	}
.leaflet-control-scale-line:not(:first-child) {
	border-top: 2px solid #777;
	border-bottom: none;
	margin-top: -2px;
	}
.leaflet-control-scale-line:not(:first-child):not(:last-child) {
	border-bottom: 2px solid #777;
	}

.leaflet-touch .leaflet-control-attribution,
.leaflet-touch .leaflet-control-layers,
.leaflet-touch .leaflet-bar {
	box-shadow: none;
	}
.leaflet-touch .leaflet-control-layers,
.leaflet-touch .leaflet-bar {
	border: 2px solid rgba(0,0,0,0.2);
	background-clip: padding-box;
	}


/* popup */

.leaflet-popup {
	position: absolute;
	text-align: center;
	margin-bottom: 20px;
	}
.leaflet-popup-content-wrapper {
	padding: 1px;
	text-align: left;
	border-radius: 12px;
	}
.leaflet-popup-content {
	margin: 13px 24px 13px 20px;
	line-height: 1.3;
	font-size: 13px;
	font-size: 1.08333em;
	min-height: 1px;
	}
.leaflet-popup-content p {

    .stat { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; text-align:center; padding:9px 4px 8px; }
    .stat b { display:block; font-size:16px; letter-spacing:-.02em; }
    .stat span { display:block; color:#64748b; font-size:10px; margin-top:2px; }
    .section { margin-top:14px; }
    .section-title { font-weight:700; font-size:12px; color:#334155; margin:0 0 7px; }
    .search-wrap { position:relative; }
    #search { width:100%; height:39px; border:1px solid #cbd5e1; border-radius:9px; padding:0 36px 0 11px; font-size:13px; outline:none; }
    #search:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    #clearSearch { position:absolute; right:5px; top:5px; width:29px; height:29px; border:0; border-radius:7px; background:transparent; color:#64748b; cursor:pointer; font-size:17px; }
    #results { display:none; margin-top:6px; border:1px solid #e2e8f0; border-radius:9px; overflow:hidden; max-height:225px; overflow-y:auto; background:#fff; }
    .result { display:block; width:100%; border:0; border-bottom:1px solid #f1f5f9; background:#fff; text-align:left; padding:9px 10px; cursor:pointer; }
    .result:last-child { border-bottom:0; }
    .result:hover { background:#eff6ff; }
    .result strong { display:block; font-size:12px; color:#0f172a; line-height:1.4; }

    .filter-left { display:flex; align-items:center; min-width:0; gap:8px; }
    .filter-left input { margin:0; }
    .dot { width:10px; height:10px; border-radius:50%; flex:0 0 auto; box-shadow:0 0 0 2px rgba(255,255,255,.9),0 0 0 3px rgba(100,116,139,.2); }

    .btn.primary { border-color:#2563eb; background:#2563eb; color:#fff; }

    .cctv-marker span { transform:rotate(45deg); color:#fff; font-weight:800; font-size:10px; text-shadow:0 1px 2px rgba(0,0,0,.35); }

    .cluster-bubble { width:44px; height:44px; border-radius:50%; background:rgba(15,118,110,.9); border:3px solid rgba(255,255,255,.92); box-shadow:0 4px 13px rgba(15,23,42,.26); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1.05; }

    .cluster-bubble b { font-size:13px; }

    summary { cursor:pointer; font-size:11px; font-weight:700; color:#334155; }

    }

        <p class="hint">우측 상단 레이어 버튼에서 일반지도/밝은지도와 위치 마커/히트맵을 켜고 끌 수 있습니다. 숫자는 해당 위치의 카메라 대수입니다.</p>

    const installFmt = v => /^\d{6}$/.test(v || '') ? `${v.slice(0,4)}-${v.slice(4)}` : (v || '-');

    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20, attribution: '&copy; OpenStreetMap contributors'
    });
    const positron = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 20, attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    });
    const map = L.map('map', { layers: [positron], zoomControl: false, preferCanvas: true });
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    map.fitBounds(initialBounds, { padding: [20,20] });

    const cluster = L.markerClusterGroup({
      showCoverageOnHover: false, spiderfyOnMaxZoom: true, maxClusterRadius: 48,
      disableClusteringAtZoom: 18,
      iconCreateFunction: function(c) {
        const children = c.getAllChildMarkers();
        const cams = children.reduce((sum, m) => sum + (m.options.cameraCount || 0), 0);
        const cls = children.length >= 100 ? 'large' : (children.length >= 25 ? 'medium' : '');
        const size = children.length >= 100 ? 58 : (children.length >= 25 ? 50 : 44);
        return L.divIcon({
          html: `<div class="cluster-bubble ${cls}"><b>${fmt(cams)}</b><span>${fmt(children.length)}곳</span></div>`,
          className: 'camera-cluster', iconSize: [size, size]
        });
      }
    });
    const heat = L.heatLayer([], { radius: 24, blur: 20, maxZoom: 17, minOpacity: .3, max: 10 });
    cluster.addTo(map);
    heat.addTo(map);
    L.control.layers({ '밝은 지도': positron, '일반 지도': osm }, { 'CCTV 위치 마커': cluster, '카메라 대수 히트맵': heat }, { position:'topright', collapsed:true }).addTo(map);

    function filteredRecords(point) { return point.records.filter(r => selected.has(r.purpose)); }
    function dominantPurpose(records) {
      const sums = {};
      records.forEach(r => sums[r.purpose] = (sums[r.purpose] || 0) + r.cameras);
      return Object.entries(sums).sort((a,b) => b[1]-a[1] || a[0].localeCompare(b[0], 'ko'))[0]?.[0] || '기타';
    }
    function unique(arr) { return [...new Set(arr.filter(Boolean))]; }
    function popupHtml(point, records) {
      const cameras = records.reduce((s,r) => s+r.cameras, 0);
      const byPurpose = {};
      records.forEach(r => byPurpose[r.purpose] = (byPurpose[r.purpose] || 0) + r.cameras);
      const badges = Object.entries(byPurpose).sort((a,b)=>b[1]-a[1]).map(([p,n]) => `<span class="badge" style="background:${colors[p] || colors['기타']}">${esc(p)} ${fmt(n)}대</span>`).join('');
      const roads = unique(records.map(r=>r.road));
      const jibuns = unique(records.map(r=>r.jibun));
      const pixels = unique(records.map(r=>r.pixels)).sort((a,b)=>Number(a)-Number(b));
      const installed = unique(records.map(r=>r.installed)).sort();
      const agencies = unique(records.map(r=>r.agency));
      const phones = unique(records.map(r=>r.phone));
      const details = records.map(r => `<div class="record"><span class="purpose-chip" style="background:${colors[r.purpose] || colors['기타']}">${esc(r.purpose)}</span> 카메라 ${fmt(r.cameras)}대 · ${esc(r.pixels || '-')}만 화소 · 설치 ${esc(installFmt(r.installed))}<br>관리번호 ${esc(r.id || '-')}</div>`).join('');
      return `<div class="popup-title">${esc(point.label)}</div><div class="popup-badges">${badges}</div><table class="popup-table"><tr><th>카메라</th><td><b>${fmt(cameras)}대</b> (${fmt(records.length)}개 레코드)</td></tr>${roads.length ? `<tr><th>도로명주소</th><td>${roads.map(esc).join('<br>')}</td></tr>` : ''}${jibuns.length ? `<tr><th>지번주소</th><td>${jibuns.map(esc).join('<br>')}</td></tr>` : ''}<tr><th>화소수</th><td>${pixels.length ? pixels.map(x=>esc(x)+'만').join(', ') : '-'}</td></tr><tr><th>설치연월</th><td>${installed.length ? esc(installFmt(installed[0])) + (installed.length>1 ? ` ~ ${esc(installFmt(installed[installed.length-1]))}` : '') : '-'}</td></tr><tr><th>관리기관</th><td>${agencies.map(esc).join('<br>') || '-'}${phones.length ? '<br>'+phones.map(esc).join(', ') : ''}</td></tr><tr><th>좌표</th><td>${point.lat.toFixed(5)}, ${point.lon.toFixed(5)}</td></tr></table><details><summary>개별 레코드 ${fmt(records.length)}건 보기</summary>${details}</details>`;
    }
    function markerIcon(purpose, cameras) {
      return L.divIcon({
        className: '', iconSize:[30,30], iconAnchor:[15,30], popupAnchor:[0,-28],
        html:`<div class="cctv-marker" style="--marker-color:${colors[purpose] || colors['기타']}"><span>${cameras > 999 ? '999+' : fmt(cameras)}</span></div>`
      });
    }

    function rebuild() {
      cluster.clearLayers();
      markersByIndex.clear();
      const heatData = [];
      let shownLocations = 0, shownRecords = 0, shownCameras = 0;
      points.forEach(point => {
        const records = filteredRecords(point);
        if (!records.length) return;
        const cameras = records.reduce((s,r)=>s+r.cameras,0);
        const purpose = dominantPurpose(records);
        const marker = L.marker([point.lat, point.lon], {
          icon: markerIcon(purpose, cameras), title: point.label, cameraCount: cameras
        }).bindTooltip(`${esc(point.label)} · ${fmt(cameras)}대`, {direction:'top', offset:[0,-26]})
          .bindPopup(popupHtml(point, records), {maxWidth:360});
        marker.pointIndex = point.i;
        cluster.addLayer(marker);
        markersByIndex.set(point.i, marker);
        heatData.push([point.lat, point.lon, Math.min(10, Math.max(1, Math.sqrt(cameras) * 2))]);
        shownLocations += 1; shownRecords += records.length; shownCameras += cameras;
      });
      heat.setLatLngs(heatData);
      document.getElementById('shown').innerHTML = `현재 <b>${fmt(shownLocations)}개 위치</b> · <b>${fmt(shownCameras)}대</b> · ${fmt(shownRecords)}개 레코드를 표시 중입니다.`;
    }

    function buildFilters() {
      const box = document.getElementById('filters');
      box.innerHTML = '';
      purposes.forEach(p => {
        const label = document.createElement('label');
        label.className = 'filter-item';
        label.innerHTML = `<span class="filter-left"><input type="checkbox" value="${esc(p)}" checked><span class="dot" style="background:${colors[p] || colors['기타']}"></span><span class="filter-name">${esc(p)}</span></span><span class="filter-count">${fmt(stats.purpose_cameras[p] || 0)}대</span>`;
        label.querySelector('input').addEventListener('change', e => { e.target.checked ? selected.add(p) : selected.delete(p); rebuild(); });
        box.appendChild(label);
      });
    }

    function setAllFilters(on) {
      selected.clear(); if (on) purposes.forEach(p=>selected.add(p));
      document.querySelectorAll('#filters input').forEach(cb=>cb.checked=on);
      rebuild();
    }

    function showPoint(index) {
      if (!markersByIndex.has(index)) { setAllFilters(true); }
      const marker = markersByIndex.get(index);
      if (!marker) return;
      map.setView(marker.getLatLng(), 18);
      cluster.zoomToShowLayer(marker, () => marker.openPopup());
      if (window.innerWidth <= 720) document.getElementById('panel').classList.add('collapsed');
    }

    function updateSearch() {
      const q = document.getElementById('search').value.trim().toLocaleLowerCase('ko-KR');
      const results = document.getElementById('results');
      if (q.length < 2) { results.style.display='none'; results.innerHTML=''; return; }
      const matches = points.filter(p => (p.label+' '+p.search).toLocaleLowerCase('ko-KR').includes(q)).slice(0, 10);
      results.style.display='block';
      if (!matches.length) { results.innerHTML='<div class="no-result">검색 결과가 없습니다.</div>'; return; }
      results.innerHTML='';
      matches.forEach(p => {
        const totalCameras = p.records.reduce((s,r)=>s+r.cameras,0);
        const btn = document.createElement('button'); btn.className='result';
        btn.innerHTML=`<strong>${esc(p.label)}</strong><span>카메라 ${fmt(totalCameras)}대 · ${fmt(p.records.length)}개 레코드</span>`;
        btn.addEventListener('click',()=>{ showPoint(p.i); results.style.display='none'; });
        results.appendChild(btn);
      });
    }

    document.getElementById('statLocations').textContent=fmt(stats.location_count);
    document.getElementById('statCameras').textContent=fmt(stats.camera_count);
    document.getElementById('statRecords').textContent=fmt(stats.record_count);
    document.getElementById('dataDate').textContent=stats.data_date || '-';
    buildFilters(); rebuild();
    document.getElementById('selectAll').addEventListener('click',()=>setAllFilters(true));
    document.getElementById('clearAll').addEventListener('click',()=>setAllFilters(false));
    document.getElementById('fit').addEventListener('click',()=>map.fitBounds(initialBounds,{padding:[20,20]}));
    document.getElementById('reset').addEventListener('click',()=>{ setAllFilters(true); map.fitBounds(initialBounds,{padding:[20,20]}); });
    document.getElementById('search').addEventListener('input', updateSearch);
    document.getElementById('search').addEventListener('keydown', e => { if (e.key==='Escape') { e.target.value=''; updateSearch(); } });
    document.getElementById('clearSearch').addEventListener('click',()=>{ const s=document.getElementById('search'); s.value=''; s.focus(); updateSearch(); });
    document.getElementById('collapse').addEventListener('click',e=>{ const p=document.getElementById('panel'); p.classList.toggle('collapsed'); e.target.textContent=p.classList.contains('collapsed')?'+':'−'; setTimeout(()=>map.invalidateSize(),200); });
  </script>
</body>
</html>
